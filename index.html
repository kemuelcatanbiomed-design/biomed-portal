<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Equipment Intake Portal (Supabase)</title>
    <!-- Include official Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #0056b3;
            --bg-color: #f4f6f9;
            --text-color: #333;
            --border-color: #ddd;
            --success: #28a745;
            --info: #17a2b8;
            --purple: #6f42c1;
            --danger: #dc3545;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 1000px;
            box-sizing: border-box;
        }
        h2, h3 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 20px;
        }
        h2 {
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 10px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        @media (max-width: 800px) { .form-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 5px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        input[type="text"]:focus, input[type="password"]:focus, select:focus { border-color: var(--primary); outline: none; }
        
        .button-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 12px 15px; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; transition: background 0.2s; flex: 1; min-width: 120px; }
        .btn-add { background-color: var(--success); color: white; }
        .btn-add:hover { background-color: #218838; }
        .btn-update { background-color: #fd7e14; color: white; }
        .btn-update:hover { background-color: #e2690f; }
        .btn-print { background-color: var(--primary); color: white; }
        .btn-print:hover { background-color: #004085; }
        .btn-clear { background-color: var(--danger); color: white; }
        .btn-clear:hover { background-color: #c82333; }

        .table-container { margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid var(--border-color); padding: 12px; text-align: left; font-size: 14px; }
        th { background-color: #f8f9fa; font-weight: 600; }
        .action-cell { text-align: center; white-space: nowrap; }
        
        /* Action buttons inside the table */
        .btn-action-edit { background-color: #ffc107; color: #333; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold; margin-right: 5px; }
        .btn-action-edit:hover { background-color: #e0a800; }
        .btn-action-delete { background-color: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-action-delete:hover { background-color: #bd2130; }
        
        .print-only-header { display: none; text-align: center; border-bottom: 3px double #333; padding-bottom: 15px; margin-bottom: 25px; }
        .signature-block { display: none; margin-top: 40px; }
        .sig-line { border-top: 1px solid #333; width: 40%; text-align: center; padding-top: 5px; font-size: 12px; }

        /* Sync Status Text style */
        .sync-status-wrapper {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
            min-height: 20px;
        }

        @media print {
            body { background: white; color: black; padding: 0; margin: 0; }
            .container { box-shadow: none; max-width: 100%; padding: 0; border: none; }
            #inputSection, .sync-status-wrapper, .action-cell, th:last-child, .button-group { display: none !important; }
            .print-only-header { display: block !important; }
            .signature-block { display: flex !important; justify-content: space-between; }
            table { width: 100%; border: 1px solid #000; }
            th, td { border: 1px solid #000; padding: 10px; color: #000; }
            th { background-color: #eaeaea !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="print-only-header">
        <h2>BIOMEDICAL ENGINEERING DEPARTMENT</h2>
        <h3>Consolidated Equipment Service &amp; Calibration Intake Report</h3>
        <p id="printDate" style="font-size: 14px; color: #555;"></p>
    </div>

    <div id="inputSection">
        <h2>Medical Equipment Entry Portal (Supabase)</h2>
        <form id="equipmentForm" onsubmit="handleFormSubmit(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label for="eqName">Equipment Name</label>
                    <input type="text" id="eqName" required="" placeholder="e.g. Syringe Pump">
                </div>
                <div class="form-group">
                    <label for="brand">Brand</label>
                    <input type="text" id="brand" required="" placeholder="e.g. Alaris">
                </div>
                <div class="form-group">
                    <label for="model">Model</label>
                    <input type="text" id="model" required="" placeholder="e.g. 8100">
                </div>
                <div class="form-group">
                    <label for="location">Location / Ward</label>
                    <input type="text" id="location" required="" placeholder="e.g. ICU Bed 4">
                </div>
                <div class="form-group">
                    <label for="serial">Serial Number (S/N)</label>
                    <input type="text" id="serial" required="" placeholder="e.g. SN-993821">
                </div>
                <div class="form-group">
                    <label for="statusType">Status Type</label>
                    <select id="statusType">
                        <option value="For Calibration">For Calibration</option>
                        <option value="For Repair">For Repair</option>
                        <option value="Done Calibration">Done Calibration</option>
                        <option value="Done Repair">Done Repair</option>
                    </select>
                </div>
            </div>
            <div class="button-group">
                <button type="submit" id="submitBtn" class="btn btn-add">✚ Add to List</button>
                <button type="button" id="cancelEditBtn" onclick="cancelEditing()" class="btn btn-clear" style="display: none;">❌ Cancel Edit</button>
                <button type="button" onclick="printReport()" class="btn btn-print">🖨️ Save/Print PDF</button>
                <button type="button" onclick="clearList()" class="btn btn-clear">🧹 Clear List</button>
            </div>
        </form>
    </div>

    <!-- Real-time Status Indicator -->
    <div class="sync-status-wrapper">
        <span id="syncStatus"></span>
    </div>

    <h3>Equipment Queue</h3>
    <div class="table-container">
        <table id="equipmentTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Equipment Name</th>
                    <th>Brand</th>
                    <th>Model</th>
                    <th>Location</th>
                    <th>Serial Number</th>
                    <th>Status Type</th>
                    <th class="action-cell">Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="signature-block">
        <div class="sig-line">Receiving Technician Signature</div>
        <div class="sig-line">Biomedical Supervisor Approval</div>
    </div>
</div>

<script>
    // ====================================================================
    // 🔑 PERMANENT SUPABASE DATABASE CONFIGURATION
    // ====================================================================
    const SUPABASE_URL = "https://fozlnwmobikzlcyzptvh.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable__a_KwlAK5oMMVKK7avBqaQ_lH8QBY-y"; 
    // ====================================================================

    let equipmentList = [];
    let supabaseClient = null;
    let editingIndex = null; // Keeps track of the index currently being edited

    // Connect Client automatically on page load
    function initializeSupabase() {
        const statusEl = document.getElementById('syncStatus');
        
        if (SUPABASE_URL !== "YOUR_SUPABASE_PROJECT_URL" && SUPABASE_KEY !== "YOUR_SUPABASE_ANON_PUBLIC_KEY") {
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                fetchFromSupabase();
            } catch (err) {
                console.error("Initialization error:", err);
                statusEl.innerHTML = "⚠️ Configuration Error: Check your URL and API Key codes.";
                statusEl.style.color = "var(--danger)";
            }
        } else {
            statusEl.innerHTML = "⚠️ Setup Required: Please edit the HTML file to insert your Supabase URL and API Key.";
            statusEl.style.color = "var(--danger)";
        }
    }

    // --- READ FROM SUPABASE ---
    async function fetchFromSupabase() {
        const statusEl = document.getElementById('syncStatus');
        if (!supabaseClient) return;

        statusEl.innerHTML = "⏳ Fetching live records from Supabase...";
        statusEl.style.color = "var(--primary)";

        try {
            const { data, error } = await supabaseClient
                .from('equipment')
                .select('*')
                .order('id', { ascending: true });

            if (error) throw error;

            equipmentList = data.map(item => ({
                id: item.id,
                name: item.name,
                brand: item.brand,
                model: item.model,
                loc: item.loc,
                sn: item.sn,
                service: item.service // Map the DB field 'service' to keep system database schema backwards compatible
            }));

            renderTable();
            saveLocalCache();
            
            statusEl.innerHTML = "✅ Supabase connected & fully synced!";
            statusEl.style.color = "var(--success)";
            setTimeout(() => { statusEl.innerHTML = ""; }, 3000);

        } catch (err) {
            statusEl.innerHTML = "❌ Supabase Sync Failed: " + err.message;
            statusEl.style.color = "var(--danger)";
            console.error(err);
        }
    }

    // --- ROUTE FORM SUBMIT TO EITHER ADD OR UPDATE ---
    function handleFormSubmit(event) {
        event.preventDefault();
        if (editingIndex !== null) {
            updateEquipment();
        } else {
            addEquipment();
        }
    }

    // --- ADD / CREATE IN SUPABASE ---
    async function addEquipment() {
        const newItem = {
            name: document.getElementById('eqName').value,
            brand: document.getElementById('brand').value,
            model: document.getElementById('model').value,
            loc: document.getElementById('location').value,
            sn: document.getElementById('serial').value,
            service: document.getElementById('statusType').value
        };

        const statusEl = document.getElementById('syncStatus');
        statusEl.innerHTML = "⏳ Adding record to Supabase...";
        statusEl.style.color = "var(--primary)";

        if (supabaseClient) {
            try {
                const { data, error } = await supabaseClient
                    .from('equipment')
                    .insert([newItem])
                    .select();

                if (error) throw error;

                if (data && data[0]) {
                    equipmentList.push({
                        id: data[0].id,
                        ...newItem
                    });
                }
                
                statusEl.innerHTML = "✅ Record saved directly to Cloud database!";
                statusEl.style.color = "var(--success)";
                setTimeout(() => { statusEl.innerHTML = ""; }, 3000);

            } catch (err) {
                alert("Failed to sync to Supabase. Record added locally only.\nError: " + err.message);
                equipmentList.push({ id: Date.now(), ...newItem });
            }
        } else {
            equipmentList.push({ id: Date.now(), ...newItem });
        }

        saveLocalCache();
        renderTable();
        resetIntakeForm();
    }

    // --- POPULATE FORM FOR EDITING ---
    function startEdit(index) {
        editingIndex = index;
        const item = equipmentList[index];

        document.getElementById('eqName').value = item.name;
        document.getElementById('brand').value = item.brand;
        document.getElementById('model').value = item.model;
        document.getElementById('location').value = item.loc;
        document.getElementById('serial').value = item.sn;
        document.getElementById('statusType').value = item.service;

        // Change submit button to look like update state
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "💾 Update Record";
        submitBtn.className = "btn btn-update";

        // Show cancel button
        document.getElementById('cancelEditBtn').style.display = "inline-block";
        document.getElementById('eqName').focus();
    }

    // --- UPDATE / PUT IN SUPABASE ---
    async function updateEquipment() {
        const item = equipmentList[editingIndex];
        const updatedItem = {
            name: document.getElementById('eqName').value,
            brand: document.getElementById('brand').value,
            model: document.getElementById('model').value,
            loc: document.getElementById('location').value,
            sn: document.getElementById('serial').value,
            service: document.getElementById('statusType').value
        };

        const statusEl = document.getElementById('syncStatus');
        statusEl.innerHTML = "⏳ Updating record in Supabase...";
        statusEl.style.color = "var(--primary)";

        if (supabaseClient && item.id) {
            try {
                const { error } = await supabaseClient
                    .from('equipment')
                    .update(updatedItem)
                    .eq('id', item.id);

                if (error) throw error;

                equipmentList[editingIndex] = { id: item.id, ...updatedItem };

                statusEl.innerHTML = "✅ Record updated successfully in Cloud!";
                statusEl.style.color = "var(--success)";
                setTimeout(() => { statusEl.innerHTML = ""; }, 3000);

            } catch (err) {
                alert("Could not update Cloud record: " + err.message);
                return;
            }
        } else {
            // Local fallback edit
            equipmentList[editingIndex] = { id: item.id || Date.now(), ...updatedItem };
        }

        saveLocalCache();
        renderTable();
        cancelEditing();
    }

    // --- RESET EDIT PROCESS ---
    function cancelEditing() {
        editingIndex = null;
        resetIntakeForm();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "✚ Add to List";
        submitBtn.className = "btn btn-add";
        
        document.getElementById('cancelEditBtn').style.display = "none";
    }

    // --- DELETE FROM SUPABASE ---
    async function removeItem(index) {
        const item = equipmentList[index];
        const statusEl = document.getElementById('syncStatus');

        if (!confirm(`Are you sure you want to delete ${item.name} (${item.sn})?`)) return;

        // If deleting the item currently under active editing
        if (editingIndex === index) {
            cancelEditing();
        }

        if (supabaseClient && item.id) {
            statusEl.innerHTML = "⏳ Removing record from Supabase...";
            statusEl.style.color = "var(--primary)";
            try {
                const { error } = await supabaseClient
                    .from('equipment')
                    .delete()
                    .eq('id', item.id);

                if (error) throw error;

                statusEl.innerHTML = "✅ Record removed successfully!";
                statusEl.style.color = "var(--success)";
                setTimeout(() => { statusEl.innerHTML = ""; }, 3000);
            } catch (err) {
                alert("Could not remove from Cloud. Error: " + err.message);
                return;
            }
        }

        equipmentList.splice(index, 1);
        saveLocalCache();
        renderTable();
    }

    // --- CLEAR ALL QUEUE RECORDS ---
    async function clearList() {
        if (!confirm("Are you sure you want to clear the entire database queue?")) return;
        
        const statusEl = document.getElementById('syncStatus');
        cancelEditing();

        if (supabaseClient) {
            statusEl.innerHTML = "⏳ Purging Supabase Database...";
            statusEl.style.color = "var(--danger)";
            try {
                const { error } = await supabaseClient
                    .from('equipment')
                    .delete()
                    .gt('id', 0); 

                if (error) throw error;

                statusEl.innerHTML = "🧹 Supabase and Local Cache cleared!";
                statusEl.style.color = "var(--success)";
                setTimeout(() => { statusEl.innerHTML = ""; }, 3000);
            } catch (err) {
                alert("Could not clear Cloud records: " + err.message);
                return;
            }
        }

        equipmentList = [];
        localStorage.removeItem('savedEquipment');
        renderTable();
    }

    // Fallback/Local storage backup
    function saveLocalCache() {
        localStorage.setItem('savedEquipment', JSON.stringify(equipmentList));
    }

    function resetIntakeForm() {
        document.getElementById('equipmentForm').reset();
        document.getElementById('eqName').focus();
    }

    // Determine status column color
    function getStatusColor(status) {
        switch(status) {
            case 'For Calibration':
                return '#0056b3'; // Blue
            case 'Done Calibration':
                return '#17a2b8'; // Light Blue/Teal
            case 'For Repair':
                return '#d9534f'; // Red
            case 'Done Repair':
                return '#fd7e14'; // Orange
            default:
                return '#333';
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        if (equipmentList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: #888; font-style: italic;">No equipment added yet.</td></tr>`;
            return;
        }

        equipmentList.forEach((item, index) => {
            const row = document.createElement('tr');
            const statusColor = getStatusColor(item.service);
            row.innerHTML = `
                <td>${index + 1}</td>
                <td><b>${item.name}</b></td>
                <td>${item.brand}</td>
                <td>${item.model}</td>
                <td>${item.loc}</td>
                <td><code>${item.sn}</code></td>
                <td style="font-weight: 600; color: ${statusColor}">${item.service || ''}</td>
                <td class="action-cell">
                    <button class="btn-action-edit" onclick="startEdit(${index})">Edit</button>
                    <button class="btn-action-delete" onclick="removeItem(${index})">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    // Page Load Process
    window.onload = function() {
        const localData = localStorage.getItem('savedEquipment');
        if (localData) {
            equipmentList = JSON.parse(localData);
            renderTable();
        }

        initializeSupabase();
    };

    function printReport() {
        if (equipmentList.length === 0) {
            alert("Your equipment list is empty!");
            return;
        }
        document.getElementById('printDate').innerText = "Report Generated On: " + new Date().toLocaleString();
        window.print();
    }
</script>

</body></html>
