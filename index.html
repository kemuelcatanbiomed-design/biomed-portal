<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Equipment Intake Portal (Supabase)</title>
    <!-- Include official Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            /* Status Pill Palette */
            --bg-calibration: #e0f2fe;
            --text-calibration: #0369a1;
            --bg-done-cal: #dcfce7;
            --text-done-cal: #15803d;
            --bg-repair: #fee2e2;
            --text-repair: #b91c1c;
            --bg-done-rep: #ffedd5;
            --text-done-rep: #c2410c;

            /* Interactive Utilities */
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --info: #0ea5e9;
            --warning: #f59e0b;
            --warning-hover: #d97706;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05), 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-color);
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 24px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
            margin: 0 0 16px 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 850px) { .form-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 550px) { .form-grid { grid-template-columns: 1fr; } }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-weight: 500;
            font-size: 13px;
            color: var(--text-muted);
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-main);
            background-color: #fff;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        /* Standardized Action Controls */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn {
            padding: 11px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add { background-color: var(--primary); color: white; }
        .btn-add:hover { background-color: var(--primary-hover); }
        .btn-update { background-color: var(--warning); color: white; }
        .btn-update:hover { background-color: var(--warning-hover); }
        .btn-print { background-color: #fff; color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-print:hover { background-color: #f1f5f9; border-color: #cbd5e1; }
        .btn-clear { background-color: transparent; color: var(--danger); border: 1px solid transparent; }
        .btn-clear:hover { background-color: var(--bg-repair); }

        .btn-cancel { background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); }
        .btn-cancel:hover { background-color: #f1f5f9; }

        /* Modern Scalable Data Tables */
        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background-color: #fff;
        }

        th, td {
            padding: 14px 18px;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f8fafc;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f8fafc; }

        .action-cell {
            text-align: right;
            white-space: nowrap;
        }
        
        /* Compact Inline Modifier Buttons */
        .btn-action-edit {
            background-color: transparent;
            color: var(--warning-hover);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            margin-right: 6px;
            transition: all 0.15s ease;
        }
        .btn-action-edit:hover { background-color: #fef3c7; border-color: #fde68a; }

        .btn-action-delete {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid transparent;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s ease;
        }
        .btn-action-delete:hover { background-color: var(--bg-repair); }
        
        /* Modernized Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .sync-status-wrapper {
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            min-height: 20px;
        }

        .print-only-header { display: none; text-align: center; border-bottom: 2px solid #000; padding-bottom: 16px; margin-bottom: 30px; }
        .signature-block { display: none; margin-top: 60px; }
        .sig-line { border-top: 1px solid #000; width: 35%; text-align: center; padding-top: 8px; font-size: 12px; font-weight: 500; }

        @media print {
            body { background: white; color: black; padding: 0; margin: 0; }
            .card { border: none; box-shadow: none; padding: 0; }
            #inputSection, .sync-status-wrapper, .action-cell, th:last-child, .button-group { display: none !important; }
            .print-only-header { display: block !important; }
            .signature-block { display: flex !important; justify-content: space-between; }
            table { width: 100%; border: 1px solid #000; border-radius: 0; }
            th, td { border: 1px solid #000; padding: 10px; color: #000; }
            th { background-color: #f1f5f9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Production Hardcopy Architecture -->
    <div class="print-only-header">
        <h2 style="justify-content: center; font-size: 24px; margin-bottom: 4px;">BIOMEDICAL ENGINEERING DEPARTMENT</h2>
        <h3 style="color: var(--text-muted); margin-bottom: 8px;">Consolidated Equipment Service &amp; Calibration Intake Report</h3>
        <p id="printDate" style="font-size: 13px; margin: 0; color: #000;"></p>
    </div>

    <!-- Intake Operations Node -->
    <div id="inputSection" class="card">
        <h2>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            Medical Equipment Entry Portal
        </h2>
        <form id="equipmentForm" onsubmit="handleFormSubmit(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label for="eqName">Equipment Name</label>
                    <input type="text" id="eqName" required placeholder="e.g. Syringe Pump">
                </div>
                <div class="form-group">
                    <label for="brand">Brand</label>
                    <input type="text" id="brand" required placeholder="e.g. Alaris">
                </div>
                <div class="form-group">
                    <label for="model">Model</label>
                    <input type="text" id="model" required placeholder="e.g. 8100">
                </div>
                <div class="form-group">
                    <label for="location">Location / Ward</label>
                    <input type="text" id="location" required placeholder="e.g. ICU Bed 4">
                </div>
                <div class="form-group">
                    <label for="serial">Serial Number (S/N)</label>
                    <input type="text" id="serial" required placeholder="e.g. SN-993821">
                </div>
                <div class="form-group">
                    <label for="statusType">Status Type</label>
                    <select id="statusType">
                        <option value="For Calibration">For Calibration</option>
                        <option value="For Repair">For Repair</option>
                        <option value="Done Calibration">Done Calibration</option>
                        <option value="Done Repair">Done Repair</option>
                    </select>
                </div>
            </div>
            <div class="button-group">
                <button type="submit" id="submitBtn" class="btn btn-add">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add to List
                </button>
                <button type="button" id="cancelEditBtn" onclick="cancelEditing()" class="btn btn-cancel" style="display: none;">Cancel Edit</button>
                <button type="button" onclick="printReport()" class="btn btn-print">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    Save/Print PDF
                </button>
                <button type="button" onclick="clearList()" class="btn btn-clear">Clear List</button>
            </div>
        </form>
    </div>

    <!-- Live Sync Diagnostics Terminal -->
    <div class="sync-status-wrapper">
        <span id="syncStatus"></span>
    </div>

    <!-- Enterprise Processing Queue Datatable -->
    <div class="card">
        <h3>Equipment Queue</h3>
        <div class="table-container">
            <table id="equipmentTable">
                <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th>Equipment Name</th>
                        <th>Brand</th>
                        <th>Model</th>
                        <th>Location</th>
                        <th>Serial Number</th>
                        <th>Status Type</th>
                        <th class="action-cell">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="signature-block">
        <div class="sig-line">Receiving Technician Signature</div>
        <div class="sig-line">Biomedical Supervisor Approval</div>
    </div>
</div>

<script>
    // ====================================================================
    // 🔑 PERMANENT SUPABASE DATABASE CONFIGURATION
    // ====================================================================
    const SUPABASE_URL = "https://fozlnwmobikzlcyzptvh.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable__a_KwlAK5oMMVKK7avBqaQ_lH8QBY-y"; 
    // ====================================================================

    let equipmentList = [];
    let supabaseClient = null;
    let editingIndex = null; 

    function initializeSupabase() {
        const statusEl = document.getElementById('syncStatus');
        
        if (SUPABASE_URL !== "YOUR_SUPABASE_PROJECT_URL" && SUPABASE_KEY !== "YOUR_SUPABASE_ANON_PUBLIC_KEY") {
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                fetchFromSupabase();
            } catch (err) {
                console.error("Initialization error:", err);
                statusEl.innerHTML = "⚠️ Configuration Error: Check URL and API code definitions.";
                statusEl.style.color = "var(--danger)";
            }
        } else {
            statusEl.innerHTML = "⚠️ Setup Required: Configure structural Supabase parameters within HTML markup.";
            statusEl.style.color = "var(--danger)";
        }
    }

    async function fetchFromSupabase() {
        const statusEl = document.getElementById('syncStatus');
        if (!supabaseClient) return;

        statusEl.innerHTML = "⏳ Fetching live records from Supabase...";
        statusEl.style.color = "var(--primary)";

        try {
            const { data, error } = await supabaseClient
                .from('equipment')
                .select('*')
                .order('id', { ascending: true });

            if (error) throw error;

            equipmentList = data.map(item => ({
                id: item.id,
                name: item.name,
                brand: item.brand,
                model: item.model,
                loc: item.loc,
                sn: item.sn,
                service: item.service 
            }));

            renderTable();
            saveLocalCache();
            
            statusEl.innerHTML = "✅ Supabase connected & fully synced!";
            statusEl.style.color = "var(--success)";
            setTimeout(() => { statusEl.innerHTML = ""; }, 3000);

        } catch (err) {
            statusEl.innerHTML = "❌ Supabase Sync Failed: " + err.message;
            statusEl.style.color = "var(--danger)";
            console.error(err);
        }
    }

    function handleFormSubmit(event) {
        event.preventDefault();
        if (editingIndex !== null) {
            updateEquipment();
        } else {
            addEquipment();
        }
    }

    async function addEquipment() {
        const newItem = {
            name: document.getElementById('eqName').value,
            brand: document.getElementById('brand').value,
            model: document.getElementById('model').value,
            loc: document.getElementById('location').value,
            sn: document.getElementById('serial').value,
            service: document.getElementById('statusType').value
        };

        const statusEl = document.getElementById('syncStatus');
        statusEl.innerHTML = "⏳ Adding record to Supabase...";
        statusEl.style.color = "var(--primary)";

        if (supabaseClient) {
            try {
                const { data, error } = await supabaseClient
                    .from('equipment')
                    .insert([newItem])
                    .select();

                if (error) throw error;

                if (data && data[0]) {
                    equipmentList.push({
                        id: data[0].id,
                        ...newItem
                    });
                }
                
                statusEl.innerHTML = "✅ Record saved directly to Cloud database!";
                statusEl.style.color = "var(--success)";
                setTimeout(() => { statusEl.innerHTML = ""; }, 3000);

            } catch (err) {
                alert("Failed to sync to Supabase. Record added locally only.\nError: " + err.message);
                equipmentList.push({ id: Date.now(), ...newItem });
            }
        } else {
            equipmentList.push({ id: Date.now(), ...newItem });
        }

        saveLocalCache();
        renderTable();
        resetIntakeForm();
    }

    function startEdit(index) {
        editingIndex = index;
        const item = equipmentList[index];

        document.getElementById('eqName').value = item.name;
        document.getElementById('brand').value = item.brand;
        document.getElementById('model').value = item.model;
        document.getElementById('location').value = item.loc;
        document.getElementById('serial').value = item.sn;
        document.getElementById('statusType').value = item.service;

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Update Record`;
        submitBtn.className = "btn btn-update";

        document.getElementById('cancelEditBtn').style.display = "inline-block";
        document.getElementById('eqName').focus();
    }

    async function updateEquipment() {
        const item = equipmentList[editingIndex];
        const updatedItem = {
            name: document.getElementById('eqName').value,
            brand: document.getElementById('brand').value,
            model: document.getElementById('model').value,
            loc: document.getElementById('location').value,
            sn: document.getElementById('serial').value,
            service: document.getElementById('statusType').value
        };

        const statusEl = document.getElementById('syncStatus');
        statusEl.innerHTML = "⏳ Updating record in Supabase...";
        statusEl.style.color = "var(--primary)";

        if (supabaseClient && item.id) {
            try {
                const { error } = await supabaseClient
                    .from('equipment')
                    .update(updatedItem)
                    .eq('id', item.id);

                if (error) throw error;

                equipmentList[editingIndex] = { id: item.id, ...updatedItem };

                statusEl.innerHTML = "✅ Record updated successfully in Cloud!";
                statusEl.style.color = "var(--success)";
                setTimeout(() => { statusEl.innerHTML = ""; }, 3000);

            } catch (err) {
                alert("Could not update Cloud record: " + err.message);
                return;
            }
        } else {
            equipmentList[editingIndex] = { id: item.id || Date.now(), ...updatedItem };
        }

        saveLocalCache();
        renderTable();
        cancelEditing();
    }

    function cancelEditing() {
        editingIndex = null;
        resetIntakeForm();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add to List`;
        submitBtn.className = "btn btn-add";
        
        document.getElementById('cancelEditBtn').style.display = "none";
    }

    async function removeItem(index) {
        const item = equipmentList[index];
        const statusEl = document.getElementById('syncStatus');

        if (!confirm(`Are you sure you want to delete ${item.name} (${item.sn})?`)) return;

        if (editingIndex === index) {
            cancelEditing();
        }

        if (supabaseClient && item.id) {
            statusEl.innerHTML = "⏳ Removing record from Supabase...";
            statusEl.style.color = "var(--primary)";
            try {
                const { error } = await supabaseClient
                    .from('equipment')
                    .delete()
                    .eq('id', item.id);

                if (error) throw error;

                statusEl.innerHTML = "✅ Record removed successfully!";
                statusEl.style.color = "var(--success)";
                setTimeout(() => { statusEl.innerHTML = ""; }, 3000);
            } catch (err) {
                alert("Could not remove from Cloud. Error: " + err.message);
                return;
            }
        }

        equipmentList.splice(index, 1);
        saveLocalCache();
        renderTable();
    }

    async function clearList() {
        if (!confirm("Are you sure you want to clear the entire database queue?")) return;
        
        const statusEl = document.getElementById('syncStatus');
        cancelEditing();

        if (supabaseClient) {
            statusEl.innerHTML = "⏳ Purging Supabase Database...";
            statusEl.style.color = "var(--danger)";
            try {
                const { error } = await supabaseClient
                    .from('equipment')
                    .delete()
                    .gt('id', 0); 

                if (error) throw error;

                statusEl.innerHTML = "🧹 Supabase and Local Cache cleared!";
                statusEl.style.color = "var(--success)";
                setTimeout(() => { statusEl.innerHTML = ""; }, 3000);
            } catch (err) {
                alert("Could not clear Cloud records: " + err.message);
                return;
            }
        }

        equipmentList = [];
        localStorage.removeItem('savedEquipment');
        renderTable();
    }

    function saveLocalCache() {
        localStorage.setItem('savedEquipment', JSON.stringify(equipmentList));
    }

    function resetIntakeForm() {
        document.getElementById('equipmentForm').reset();
        document.getElementById('eqName').focus();
    }

    // Dynamic UI Badge Controller Mapping
    function getStatusStyles(status) {
        switch(status) {
            case 'For Calibration':
                return `background-color: var(--bg-calibration); color: var(--text-calibration);`;
            case 'Done Calibration':
                return `background-color: var(--bg-done-cal); color: var(--text-done-cal);`;
            case 'For Repair':
                return `background-color: var(--bg-repair); color: var(--text-repair);`;
            case 'Done Repair':
                return `background-color: var(--bg-done-rep); color: var(--text-done-rep);`;
            default:
                return `background-color: var(--border-color); color: var(--text-main);`;
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        if (equipmentList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; padding: 32px; color: var(--text-muted); font-style: italic;">No workflow instances queued in engine context.</td></tr>`;
            return;
        }

        equipmentList.forEach((item, index) => {
            const row = document.createElement('tr');
            const statusStyle = getStatusStyles(item.service);
            row.innerHTML = `
                <td style="color: var(--text-muted); font-weight: 500;">${index + 1}</td>
                <td><span style="font-weight: 600; color: var(--text-main);">${item.name}</span></td>
                <td>${item.brand}</td>
                <td>${item.model}</td>
                <td>${item.loc}</td>
                <td><code style="font-family: monospace; background: var(--bg-color); padding: 3px 6px; border-radius: 4px; font-size: 13px;">${item.sn}</code></td>
                <td><span class="status-badge" style="${statusStyle}">${item.service || ''}</span></td>
                <td class="action-cell">
                    <button class="btn-action-edit" onclick="startEdit(${index})">Edit</button>
                    <button class="btn-action-delete" onclick="removeItem(${index})">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    window.onload = function() {
        const localData = localStorage.getItem('savedEquipment');
        if (localData) {
            equipmentList = JSON.parse(localData);
            renderTable();
        }
        initializeSupabase();
    };

    function printReport() {
        if (equipmentList.length === 0) {
            alert("Your equipment list is empty!");
            return;
        }
        document.getElementById('printDate').innerText = "Report Generated On: " + new Date().toLocaleString();
        window.print();
    }
</script>

</body>
</html>
